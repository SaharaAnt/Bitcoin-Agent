name: High-Frequency Price Alert Check

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Alert checking endpoint
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://bitcoin-agent-main.vercel.app/api/cron/alerts)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "API request failed with status $HTTP_STATUS"
            exit 1
          fi
